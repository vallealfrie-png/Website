<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Central Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #386641;
            --secondary: #6a994e;
            --light: #a7c957;
        }
        body {
            background-color: #f2f4f3;
            font-family: 'Inter', sans-serif;
        }
        .sidebar {
            width: 0;
            transition: 0.3s;
            overflow: hidden;
            background-color: var(--primary);
        }
        .sidebar.active {
            width: 250px;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 flex justify-between items-center p-4 px-8 bg-white shadow-sm">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="text-2xl text-[#386641] focus:outline-none">
                <i class="fa-solid fa-bars-staggered"></i>
            </button>
            <h1 class="text-xl font-bold text-[#386641] tracking-tight">Marketing Central Intelligence</h1>
        </div>
        
        <img src="https://i.imgur.com/VWEvNnK.png" alt="Logo" class="h-12 w-auto">
    </nav>

    <div id="mySidebar" class="sidebar fixed top-0 left-0 h-full z-50 flex flex-col pt-20">
        <a href="#" class="p-4 text-white hover:bg-[#6a994e] flex items-center gap-3"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="#" class="p-4 text-white hover:bg-[#6a994e] flex items-center gap-3"><i class="fas fa-users"></i> Audience</a>
        <a href="#" class="p-4 text-white hover:bg-[#6a994e] flex items-center gap-3"><i class="fas fa-bullseye"></i> Campaigns</a>
        <a href="#" class="p-4 text-white hover:bg-[#6a994e] flex items-center gap-3"><i class="fas fa-cog"></i> Settings</a>
    </div>

    <section class="relative min-h-screen pt-24 flex flex-col items-center justify-center overflow-hidden">
        <div class="absolute top-20 right-[-10%] w-64 h-64 bg-[#a7c957] rounded-full filter blur-[100px] opacity-20"></div>
        <div class="absolute bottom-10 left-[-10%] w-96 h-96 bg-[#386641] rounded-full filter blur-[120px] opacity-10"></div>

        <div class="container mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
            <div class="order-2 md:order-1 text-center md:text-left">
                <h2 class="text-5xl font-extrabold text-[#386641] leading-tight mb-6">
                    Centralizing <span class="text-[#6a994e]">Strategic Insight</span>
                </h2>
                <p class="text-gray-600 text-lg mb-8 max-w-lg">
                    Unlocking data-driven results through the power of collective intelligence and precise market analysis.
                </p>
                <div class="flex flex-col sm:flex-row gap-4 justify-center md:justify-start">
                    <button class="bg-[#386641] text-white px-8 py-3 rounded-lg font-semibold hover:bg-[#6a994e] transition shadow-lg">
                        Get Started
                    </button>
                    <button class="border-2 border-[#a7c957] text-[#386641] px-8 py-3 rounded-lg font-semibold hover:bg-[#a7c957]/10 transition">
                        View Reports
                    </button>
                </div>
            </div>

            <div class="order-1 md:order-2 flex justify-center">
                <div class="relative p-2 bg-[#a7c957]/20 rounded-2xl">
                    <img src="https://i.imgur.com/CPcBMHd.png" alt="Main Visualization" class="rounded-xl shadow-2xl max-w-full h-auto">
                </div>
            </div>
        </div>
    </section>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById("mySidebar");
            sidebar.classList.toggle("active");
        }
    </script>

</body>
</html>
