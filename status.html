<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Board | Projectvibe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background: #022c22; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        tr:nth-child(even) { background: rgba(255, 255, 255, 0.02); }
        .pulse-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .dot-in { background: #34d399; box-shadow: 0 0 10px #34d399; }
        .dot-out { background: #f87171; box-shadow: 0 0 10px #f87171; }
        /* Simple scrollbar for mobile */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase italic">Document Status Board</h1>
                <p class="text-emerald-500 text-[10px] font-bold tracking-[0.3em]">Live Intelligence Tracking</p>
            </div>
            <div class="flex gap-3">
                <button onclick="loadLogs()" class="bg-white/5 px-4 py-2 rounded-xl text-xs font-bold hover:bg-white/10 transition">
                    <i class="fa-solid fa-rotate mr-2"></i> Sync
                </button>
                <a href="logger.html" class="bg-[#a7c957] text-[#022c22] px-4 py-2 rounded-xl text-xs font-bold hover:opacity-90 transition shadow-lg">
                    <i class="fa-solid fa-plus mr-2"></i> New Entry
                </a>
            </div>
        </div>

        <div id="debug-error" class="hidden mb-6 p-4 bg-red-900/50 border border-red-500 text-red-200 rounded-2xl text-xs font-mono"></div>

        <div class="glass-card rounded-[2.5rem] overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white/10 text-[10px] uppercase tracking-[0.2em] text-emerald-400 font-black">
                            <th class="p-6">Document Info</th>
                            <th class="p-6">Current Dept</th>
                            <th class="p-6">Status</th>
                            <th class="p-6">Recent History</th>
                            <th class="p-6 text-right">Update</th>
                        </tr>
                    </thead>
                    <tbody id="status-table-body" class="text-sm">
                        <tr><td colspan="5" class="p-24 text-center">
                            <i class="fa-solid fa-circle-notch fa-spin text-3xl text-emerald-500 mb-4"></i>
                            <p class="opacity-40 uppercase tracking-widest text-[10px] font-bold">Establishing Secure Connection...</p>
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://jvjxrwmarwzbzlagqhhh.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2anhyd21hcnd6YnpsYWdxaGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4OTYzNzYsImV4cCI6MjA4OTQ3MjM3Nn0.4cviind0KHFRMSM20UN5-dDEAYi-3vQbLB6wAebzlcQ';
        
        const supabase = window.supabase.createClient(S_URL, S_KEY);
        
        async function loadLogs() {
            const tbody = document.getElementById('status-table-body');
            const debugBox = document.getElementById('debug-error');

            try {
                // Fetching all data. Note: using 'timestamp' as per your column info
                const { data, error } = await supabase
                    .from('document_logs')
                    .select('*')
                    .order('timestamp', { ascending: false });

                if (error) {
                    debugBox.innerText = "SUPABASE ERROR: " + error.message;
                    debugBox.classList.remove('hidden');
                    tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-400 font-bold italic underline">Check Database Connection</td></tr>`;
                    return;
                }

                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="p-24 text-center">
                        <div class="opacity-20 text-4xl mb-4"><i class="fa-solid fa-folder-open"></i></div>
                        <p class="opacity-50 uppercase tracking-widest text-xs font-bold">No Records Found</p>
                    </td></tr>`;
                    return;
                }

                // Grouping by Document Name
                const groups = {};
                data.forEach(log => {
                    if (!groups[log.document_name]) groups[log.document_name] = [];
                    groups[log.document_name].push(log);
                });

                tbody.innerHTML = '';
                debugBox.classList.add('hidden');

                Object.keys(groups).forEach(docName => {
                    const logs = groups[docName];
                    const latest = logs[0]; 
                    
                    // History breakdown (Last 3 movements)
                    const historyHtml = logs.slice(0, 3).map(l => {
                        const time = new Date(l.timestamp).toLocaleString('en-PH', { 
                            month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' 
                        });
                        return `
                            <div class="flex items-center gap-2 text-[10px] mb-1.5 font-bold">
                                <span class="${l.action === 'IN' ? 'text-emerald-400' : 'text-red-400'} uppercase">${l.action}</span>
                                <span class="opacity-30">|</span>
                                <span class="opacity-80">${l.department}</span>
                                <span class="opacity-30">|</span>
                                <span class="opacity-40 font-normal">${time}</span>
                            </div>
                        `;
                    }).join('');

                    const row = document.createElement('tr');
                    row.className = "hover:bg-white/5 transition-all cursor-pointer group";
                    
                    // Action: Clicking row sends you to logger to "toggle" the status
                    row.onclick = () => {
                        const nextAction = latest.action === 'IN' ? 'OUT' : 'IN';
                        window.location.href = `logger.html?name=${encodeURIComponent(docName)}&cat=${encodeURIComponent(latest.category)}&dept=${encodeURIComponent(latest.department)}&suggestAction=${nextAction}`;
                    };
                    
                    row.innerHTML = `
                        <td class="p-6 border-b border-white/5">
                            <div class="font-bold text-white group-hover:text-[#a7c957] transition-colors text-base">${docName}</div>
                            <div class="text-[9px] text-emerald-500 uppercase font-black tracking-widest mt-1">${latest.category}</div>
                        </td>
                        <td class="p-6 border-b border-white/5 font-semibold opacity-90">${latest.department}</td>
                        <td class="p-6 border-b border-white/5">
                            <span class="inline-flex items-center px-3 py-1.5 rounded-full text-[10px] font-black uppercase ${latest.action === 'IN' ? 'bg-emerald-500/10 text-emerald-400 ring-1 ring-emerald-500/30' : 'bg-red-500/10 text-red-400 ring-1 ring-red-500/30'}">
                                <span class="pulse-dot ${latest.action === 'IN' ? 'dot-in' : 'dot-out'}"></span>
                                ${latest.action}
                            </span>
                        </td>
                        <td class="p-6 border-b border-white/5">${historyHtml}</td>
                        <td class="p-6 border-b border-white/5 text-right">
                            <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center ml-auto group-hover:bg-[#a7c957] group-hover:text-[#022c22] transition-all">
                                <i class="fa-solid fa-arrow-right-arrow-left text-[10px]"></i>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                debugBox.innerText = "CRITICAL JS ERROR: " + err.message;
                debugBox.classList.remove('hidden');
            }
        }

        window.onload = loadLogs;
        // Refresh data every minute
        setInterval(loadLogs, 60000);
    </script>
</body>
</html>
