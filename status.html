<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Board | Projectvibe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background: #022c22; color: white; font-family: sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .status-in { color: #34d399; }
        .status-out { color: #f87171; }
        tr:nth-child(even) { background: rgba(255, 255, 255, 0.02); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase">Document Status Board</h1>
                <p class="text-emerald-500 text-[10px] font-bold tracking-[0.3em]">Live Tracking System</p>
            </div>
            <a href="logger.html" class="bg-white/10 px-4 py-2 rounded-xl text-xs font-bold hover:bg-white/20 transition">
                <i class="fa-solid fa-plus mr-2"></i> New Log
            </a>
        </div>

        <div class="glass-card rounded-[2rem] overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white/10 text-[10px] uppercase tracking-widest text-emerald-400">
                            <th class="p-5">Document / Category</th>
                            <th class="p-5">Current Location</th>
                            <th class="p-5">Latest Status</th>
                            <th class="p-5">Movement History</th>
                            <th class="p-5 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="status-table-body" class="text-sm">
                        <tr><td colspan="5" class="p-10 text-center opacity-50">Fetching live data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://jvjxrwmarwzbzlagqhhh.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2anhyd21hcnd6YnpsYWdxaGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4OTYzNzYsImV4cCI6MjA4OTQ3MjM3Nn0.4cviind0KHFRMSM20UN5-dDEAYi-3vQbLB6wAebzlcQ';
        const supabase = window.supabase.createClient(S_URL, S_KEY);

        async function loadLogs() {
            // Get all logs ordered by timestamp
            const { data, error } = await supabase
                .from('document_logs')
                .select('*')
                .order('timestamp', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }

            // Group logs by Document Name
            const groups = {};
            data.forEach(log => {
                if (!groups[log.document_name]) {
                    groups[log.document_name] = [];
                }
                groups[log.document_name].push(log);
            });

            const tbody = document.getElementById('status-table-body');
            tbody.innerHTML = '';

            Object.keys(groups).forEach(docName => {
                const logs = groups[docName];
                const latest = logs[0]; // First in array due to descending order
                
                // Build History String
                const historyHtml = logs.slice(0, 3).map(l => `
                    <div class="text-[10px] mb-1 opacity-80">
                        <span class="${l.action === 'IN' ? 'text-emerald-400' : 'text-red-400'} font-bold">${l.action}</span> 
                        ${l.department} | ${new Date(l.timestamp).toLocaleString([], {month: 'numeric', day: 'numeric', hour: '2-digit', minute:'2-digit'})}
                    </div>
                `).join('');

                const row = document.createElement('tr');
                row.className = "hover:bg-white/5 transition-colors cursor-pointer";
                row.onclick = () => redirectToLogger(latest);
                
                row.innerHTML = `
                    <td class="p-5">
                        <div class="font-bold text-white">${docName}</div>
                        <div class="text-[10px] text-emerald-500 uppercase tracking-tighter">${latest.category}</div>
                    </td>
                    <td class="p-5 font-medium">${latest.department}</td>
                    <td class="p-5">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${latest.action === 'IN' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}">
                            ${latest.action}
                        </span>
                    </td>
                    <td class="p-5">${historyHtml}</td>
                    <td class="p-5 text-right">
                        <i class="fa-solid fa-chevron-right opacity-20"></i>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function redirectToLogger(log) {
            // Pass the data to logger via URL parameters
            const params = new URLSearchParams({
                name: log.document_name,
                cat: log.category,
                dept: log.department,
                suggestAction: log.action === 'IN' ? 'OUT' : 'IN'
            });
            window.location.href = `logger.html?${params.toString()}`;
        }

        loadLogs();
        // Refresh every 30 seconds
        setInterval(loadLogs, 30000);
    </script>
</body>
</html>
