<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline Intelligence | Executive View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background: #022c22; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* THE PIPELINE WRAPPER */
        .pipeline-wrapper { position: relative; width: 100%; margin: 3rem 0; padding: 2rem 0; overflow-x: auto; display: flex; align-items: center; }
        
        /* THE ENGULFED LINE (Passes through the center) */
        .pipeline-line { position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: rgba(52, 211, 153, 0.3); z-index: 1; transform: translateY(-50%); }

        /* THE STEPS */
        .pipeline-container { display: flex; justify-content: space-between; width: 100%; position: relative; z-index: 10; padding: 0 40px; }
        .pipeline-step { display: flex; flex-direction: column; align-items: center; position: relative; min-width: 120px; }

        /* THE MINIMALIST DOT */
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #10b981; border: 2px solid #022c22; z-index: 20; box-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        
        /* PULSING FOR CURRENT LOCATION */
        .is-latest .dot { background: #34d399; transform: scale(1.2); animation: pulse-dot 1.5s infinite; }
        @keyframes pulse-dot { 0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7); } 70% { box-shadow: 0 0 0 8px rgba(52, 211, 153, 0); } 100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); } }

        /* LABELS (Minimalist & Centered) */
        .step-dept { position: absolute; bottom: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; white-space: nowrap; color: rgba(255,255,255,0.9); }
        .step-time { position: absolute; top: 20px; font-size: 9px; opacity: 0.4; font-weight: bold; white-space: nowrap; }

        /* FINISHED THEME */
        .doc-finished .pipeline-line { background: rgba(245, 158, 11, 0.3); }
        .doc-finished .dot { background: #f59e0b; box-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-12 border-b border-white/10 pb-8">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase italic">Pipeline View</h1>
                <p class="text-emerald-400 text-[10px] font-bold tracking-[0.3em]">EXECUTIVE INTELLIGENCE</p>
            </div>
            <div class="flex gap-3">
                <button onclick="loadData()" class="bg-white/5 hover:bg-white/10 px-4 py-2 rounded-xl text-[10px] font-bold transition">
                    <i class="fa-solid fa-sync mr-1"></i> SYNC
                </button>
                <a href="status.html" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-xl text-[10px] font-bold transition">
                    EXIT
                </a>
            </div>
        </div>

        <div id="display-area" class="space-y-6">
            <div class="p-20 text-center glass-card rounded-3xl opacity-30 text-xs font-bold uppercase tracking-widest">
                Establishing Secured Link...
            </div>
        </div>
    </div>

    <script>
        // FIXED & SECURED KEY
        const S_URL = 'https://jvjxrwmarwzbzlagqhhh.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2anhyd21hcnd6YnpsYWdxaGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4OTYzNzYsImV4cCI6MjA4OTQ3MjM3Nn0.4cviind0KHFRMSM20UN5-dDEAYi-3vQbLB6wAebzlcQ';
        
        const dbClient = window.supabase.createClient(S_URL, S_KEY);

        async function loadData() {
            const container = document.getElementById('display-area');
            try {
                const { data, error } = await dbClient.from('document_logs').select('*').order('timestamp', { ascending: true });
                if (error) throw error;

                const groups = data.reduce((acc, log) => {
                    if (!acc[log.document_name]) acc[log.document_name] = [];
                    acc[log.document_name].push(log);
                    return acc;
                }, {});

                container.innerHTML = '';

                Object.keys(groups).forEach(name => {
                    const logs = groups[name];
                    const isFinished = logs[logs.length - 1].action === 'FINISHED';
                    
                    const panel = document.createElement('div');
                    panel.className = `glass-card p-8 rounded-[2rem] ${isFinished ? 'doc-finished' : ''}`;
                    
                    let header = `
                        <div class="flex justify-between items-start mb-6">
                            <h2 class="text-lg font-black italic uppercase">${name}</h2>
                            <span class="text-[9px] font-black px-2 py-1 bg-white/5 rounded text-emerald-400">${logs[0].category}</span>
                        </div>
                    `;

                    let timeline = `<div class="pipeline-wrapper"><div class="pipeline-line"></div><div class="pipeline-container">`;
                    
                    logs.forEach((log, index) => {
                        const isLast = index === logs.length - 1;
                        const date = new Date(log.timestamp).toLocaleString('en-PH', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                        
                        timeline += `
                            <div class="pipeline-step ${isLast ? 'is-latest' : ''}">
                                <div class="step-time uppercase">${date}</div>
                                <div class="dot"></div>
                                <div class="step-dept">${log.department}</div>
                            </div>
                        `;
                    });

                    timeline += `</div></div>`;
                    panel.innerHTML = header + timeline;
                    container.appendChild(panel);
                });
            } catch (e) {
                container.innerHTML = `<div class="p-10 text-red-400 text-center font-bold">API Error: ${e.message}</div>`;
            }
        }
        window.onload = loadData;
    </script>
</body>
</html>
