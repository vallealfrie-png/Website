<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Intelligence | Projectvibe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background: #022c22; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        
        /* TABS */
        .tab-btn { position: relative; padding: 0.75rem 1.5rem; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.3s; opacity: 0.4; }
        .tab-btn.active { opacity: 1; color: #10b981; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 25%; right: 25%; height: 2px; background: #10b981; box-shadow: 0 0 10px #10b981; }

        /* THE PIPELINE TRACK */
        .pipeline-track { position: relative; width: 100%; margin: 3.5rem 0; padding: 1.5rem 0; display: flex; align-items: center; }
        .pipeline-line { position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: rgba(16, 185, 129, 0.2); z-index: 1; transform: translateY(-50%); }

        /* THE STEPS */
        .pipeline-items { display: flex; justify-content: flex-start; width: 100%; position: relative; z-index: 10; padding: 0 20px; gap: 45px; }
        .step-node { display: flex; flex-direction: column; align-items: center; position: relative; min-width: 90px; }

        /* THE MINIMALIST DOT */
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #10b981; border: 2px solid #022c22; z-index: 20; box-shadow: 0 0 8px rgba(16, 185, 129, 0.4); }
        
        .is-latest .dot { background: #34d399; transform: scale(1.3); animation: pulse-dot 1.5s infinite; }
        @keyframes pulse-dot { 0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(52, 211, 153, 0); } 100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); } }

        .dept-label { position: absolute; bottom: 18px; font-size: 9px; font-weight: 900; text-transform: uppercase; white-space: nowrap; color: #34d399; }
        .time-label { position: absolute; top: 18px; font-size: 8px; opacity: 0.4; font-weight: bold; white-space: nowrap; }

        /* FINISHED THEME (ORANGE/GOLD) */
        .doc-archived .pipeline-line { background: rgba(245, 158, 11, 0.2); }
        .doc-archived .dot { background: #f59e0b; box-shadow: 0 0 8px rgba(245, 158, 11, 0.4); }
        .doc-archived .dept-label { color: #f59e0b; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-6xl mx-auto">
        <nav class="flex justify-between items-center mb-6 border-b border-white/10 pb-8">
            <div class="flex items-center gap-4">
                <div class="h-10 w-10 bg-emerald-500/10 rounded-xl flex items-center justify-center border border-emerald-500/20">
                    <i class="fa-solid fa-layer-group text-emerald-500"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter uppercase italic">Visual Intelligence</h1>
                    <p class="text-emerald-500 text-[9px] font-bold tracking-[0.4em] uppercase opacity-70">Document Live Flow</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="syncData()" class="bg-white/5 hover:bg-white/10 text-white px-5 py-2.5 rounded-xl text-[10px] font-bold transition flex items-center gap-2">
                    <i class="fa-solid fa-rotate"></i> SYNC
                </button>
                <a href="index.html" class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2.5 rounded-xl text-[10px] font-bold transition flex items-center gap-2 shadow-lg shadow-emerald-900/20">
                    <i class="fa-solid fa-house"></i> Home
                </a>
            </div>
        </nav>

        <div class="flex gap-4 mb-8">
            <button onclick="switchTab('active')" id="btn-active" class="tab-btn active">Active Projects</button>
            <button onclick="switchTab('finished')" id="btn-finished" class="tab-btn">Finished Documents</button>
        </div>

        <div id="pipeline-feed" class="space-y-6">
            <div class="p-20 text-center glass-card rounded-3xl opacity-30 text-[10px] font-black uppercase tracking-widest">
                <i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Initializing Stream...
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://jvjxrwmarwzbzlagqhhh.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2anhyd21hcnd6YnpsYWdxaGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4OTYzNzYsImV4cCI6MjA4OTQ3MjM3Nn0.4cviind0KHFRMSM20UN5-dDEAYi-3vQbLB6wAebzlcQ';
        const dbClient = window.supabase.createClient(S_URL, S_KEY);

        let allGroups = {};
        let currentTab = 'active';

        async function syncData() {
            const feed = document.getElementById('pipeline-feed');
            try {
                const { data, error } = await dbClient.from('document_logs').select('*').order('timestamp', { ascending: true });
                if (error) throw error;

                // Group data by document name
                allGroups = data.reduce((acc, log) => {
                    if (!acc[log.document_name]) acc[log.document_name] = [];
                    acc[log.document_name].push(log);
                    return acc;
                }, {});

                renderFeed();
            } catch (e) {
                feed.innerHTML = `<div class="p-10 text-red-400 text-center font-bold text-xs uppercase tracking-widest">Connection Error: ${e.message}</div>`;
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('btn-active').classList.toggle('active', tab === 'active');
            document.getElementById('btn-finished').classList.toggle('active', tab === 'finished');
            renderFeed();
        }

        function renderFeed() {
            const feed = document.getElementById('pipeline-feed');
            feed.innerHTML = '';
            
            let filteredCount = 0;

            Object.keys(allGroups).forEach(docName => {
                const logs = allGroups[docName];
                const isFinished = logs[logs.length - 1].action === 'FINISHED';
                
                // Filtering logic
                if (currentTab === 'finished' && !isFinished) return;
                if (currentTab === 'active' && isFinished) return;

                filteredCount++;
                const card = document.createElement('div');
                card.className = `glass-card p-8 rounded-[2.5rem] shadow-xl ${isFinished ? 'doc-archived' : ''}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2 px-2">
                        <div>
                            <h2 class="text-xl font-black italic uppercase tracking-tighter text-white/90">${docName}</h2>
                            <span class="text-[9px] font-black ${isFinished ? 'text-amber-500' : 'text-emerald-500'} opacity-60 uppercase tracking-widest">${logs[0].category}</span>
                        </div>
                        <div class="text-right">
                             <span class="text-[8px] font-black opacity-30 uppercase">${isFinished ? 'STATUS: ARCHIVED' : 'Total Moves: ' + logs.length}</span>
                        </div>
                    </div>
                    <div class="pipeline-track">
                        <div class="pipeline-line"></div>
                        <div class="pipeline-items">
                            ${logs.map((log, index) => {
                                const isLatest = index === logs.length - 1;
                                const date = new Date(log.timestamp).toLocaleString('en-PH', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                                return `
                                    <div class="step-node ${isLatest && !isFinished ? 'is-latest' : ''}">
                                        <div class="time-label uppercase">${date}</div>
                                        <div class="dot"></div>
                                        <div class="dept-label">${log.department}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
                feed.appendChild(card);
            });

            if (filteredCount === 0) {
                feed.innerHTML = `<div class="p-20 text-center glass-card rounded-3xl opacity-30 text-[10px] font-black uppercase tracking-widest">No ${currentTab} documents found</div>`;
            }
        }

        window.onload = syncData;
    </script>
</body>
</html>
