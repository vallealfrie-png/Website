<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline Intelligence | Executive View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at center, #064e3b 0%, #022c22 100%); color: white; font-family: sans-serif; min-height: 100vh; margin: 0; padding: 0; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        
        /* PIPELINE STRUCTURE */
        .pipeline-wrapper { position: relative; width: 100%; margin: 3rem 0; padding: 2.5rem 0; overflow-x: auto; scrollbar-width: thin; }
        .pipeline-container { display: flex; align-items: center; justify-content: center; position: relative; width: 100%; z-index: 10; padding: 0 5%; }

        /* THE CONNECTING BAR */
        .pipeline-bar { position: absolute; top: 50%; left: 10%; right: 10%; height: 12px; transform: translateY(-50%); background: rgba(255, 255, 255, 0.1); border-radius: 10px; z-index: 5; box-shadow: inset 0 2px 5px rgba(0,0,0,0.4); }

        /* THE STEP CIRCLE (3D BEVEL) */
        .pipeline-circle { position: relative; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 20; border: 3px solid #1f2937; transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .pipeline-step { position: relative; display: flex; flex-direction: column; align-items: center; min-width: 140px; }
        
        /* STATE COLORS */
        .state-complete .pipeline-circle { background: linear-gradient(180deg, #166534 0%, #10b981 100%); border-color: rgba(255,255,255,0.2); }
        
        .is-latest .pipeline-circle { background: linear-gradient(180deg, #065f46 0%, #10b981 100%); border-color: #10b981; animation: pulse-active 1.5s infinite; }
        
        .state-finished .pipeline-circle { background: linear-gradient(180deg, #92400e 0%, #f59e0b 100%); border-color: rgba(255,255,255,0.4); }

        /* TEXT LABELS */
        .step-dept { margin-bottom: 1.5rem; font-size: 11px; font-weight: 800; text-transform: uppercase; color: white; letter-spacing: 0.05em; }
        .step-time { margin-top: 1.5rem; font-size: 10px; opacity: 0.4; font-style: italic; font-weight: bold; }

        @keyframes pulse-active { 
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 
            70% { box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } 
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-4 border-b border-white/10 pb-8">
            <div>
                <h1 class="text-4xl font-black tracking-tighter uppercase italic">Intelligence Flow</h1>
                <p class="text-emerald-400 text-[11px] font-bold tracking-[0.5em] mt-1">EXECUTIVE TRACKING VIEW</p>
            </div>
            <div class="flex gap-3">
                <button onclick="loadPipelines()" class="bg-white/5 text-white/80 px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-white/10 transition">
                    <i class="fa-solid fa-sync mr-2"></i> Refresh
                </button>
                <a href="status.html" class="bg-emerald-600 text-white px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-emerald-500 transition shadow-lg">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Exit
                </a>
            </div>
        </div>

        <div id="intelligence-container" class="space-y-12">
            <div class="p-20 text-center glass-panel rounded-[3rem]">
                <i class="fa-solid fa-circle-notch fa-spin text-2xl text-emerald-500 mb-4"></i>
                <p class="uppercase tracking-widest text-[10px] font-black opacity-40">Connecting...</p>
            </div>
        </div>
    </div>

    <script>
        // CORRECTED API KEY
        const S_URL = 'https://jvjxrwmarwzbzlagqhhh.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2anhyd21hcnd6YnpsYWdxaGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4OTYzNzYsImV4cCI6MjA4OTQ3MjM3Nn0.4cviind0KHFRMSM20UN5-dDEAYi-3vQbLB6wAebzlcQ';
        
        const dbClient = window.supabase.createClient(S_URL, S_KEY);

        async function loadPipelines() {
            const container = document.getElementById('intelligence-container');
            try {
                const { data, error } = await dbClient.from('document_logs').select('*').order('timestamp', { ascending: true });
                if (error) throw error;
                
                const groups = {};
                data.forEach(log => {
                    if (!groups[log.document_name]) groups[log.document_name] = [];
                    groups[log.document_name].push(log);
                });

                container.innerHTML = ''; 
                Object.keys(groups).forEach(docName => {
                    const logs = groups[docName];
                    const latest = logs[logs.length - 1];
                    const isFinished = latest.action === 'FINISHED';

                    const panel = document.createElement('div');
                    panel.className = 'glass-panel p-10 rounded-[3.5rem] shadow-2xl overflow-hidden';
                    
                    let headerHtml = `
                        <div class="flex justify-between items-start mb-10 border-b border-white/5 pb-6">
                            <div>
                                <h2 class="text-2xl font-black text-white italic tracking-tighter uppercase">${docName}</h2>
                                <div class="text-[10px] text-emerald-500 uppercase font-black tracking-[0.2em] mt-1">${latest.category}</div>
                            </div>
                            <div class="text-right">
                                <span class="text-[9px] font-black opacity-30 uppercase">Latest Station</span>
                                <div class="text-lg font-black text-white italic">${isFinished ? 'ARCHIVED' : latest.department}</div>
                            </div>
                        </div>
                    `;

                    let timelineHtml = `<div class="pipeline-wrapper"><div class="pipeline-bar"></div><div class="pipeline-container">`;
                    logs.forEach((log, index) => {
                        const dateObj = new Date(log.timestamp);
                        const timeStr = dateObj.toLocaleString('en-PH', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                        const isLastStep = (index === logs.length - 1);
                        const stateClass = (isFinished && isLastStep) ? 'state-finished' : isLastStep ? 'is-latest' : 'state-complete';

                        timelineHtml += `
                            <div class="pipeline-step ${stateClass}">
                                <div class="step-dept">${log.department}</div>
                                <div class="pipeline-circle">
                                    <i class="fa-solid ${log.action === 'FINISHED' ? 'fa-check-double' : 'fa-check'} text-xs"></i>
                                </div>
                                <div class="step-time uppercase">${timeStr}</div>
                            </div>
                        `;
                    });
                    timelineHtml += '</div></div>';
                    panel.innerHTML = headerHtml + timelineHtml;
                    container.appendChild(panel);
                });
            } catch (err) {
                container.innerHTML = `<div class="p-10 text-red-400 text-center">API Error: ${err.message}</div>`;
            }
        }
        window.onload = loadPipelines;
    </script>
</body>
</html>
