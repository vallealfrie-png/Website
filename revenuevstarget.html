<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/highcharts-more.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        .highcharts-figure { min-width: 310px; max-width: 800px; margin: 0 auto; }
        #container { height: 420px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 mb-8 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <span class="text-white font-bold text-xl">R</span>
                </div>
                <span class="text-xl font-bold text-slate-800 tracking-tight">RevenueTracker</span>
            </div>
            <div class="flex space-x-6 font-medium text-slate-600">
                <a href="index.html" class="hover:text-blue-600 transition-colors">Home</a>
                <a href="revenuevstarget.html" class="text-blue-600 border-b-2 border-blue-600">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4">
        <div class="bg-white rounded-xl shadow-sm p-6 mb-6 border border-slate-200">
            <h1 class="text-2xl font-bold text-slate-800 mb-4">Department Performance</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Select Month</label>
                    <select id="monthSelect" class="w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5">
                        <option value="Jan">January</option>
                        <option value="Feb">February</option>
                        <option value="Mar">March</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Select Department</label>
                    <select id="deptSelect" class="w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5">
                        <option value="ALL">All Departments</option>
                        </select>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md p-8 border border-slate-200">
            <div id="loading" class="hidden text-center py-20 text-slate-400 animate-pulse font-medium text-lg">Fetching Latest Data...</div>
            <figure class="highcharts-figure">
                <div id="container"></div>
            </figure>
            
            <div class="grid grid-cols-2 gap-4 mt-4 border-t border-slate-100 pt-8">
                <div class="text-center">
                    <p class="text-xs text-slate-400 uppercase tracking-widest font-bold mb-1">Total Revenue</p>
                    <p id="revText" class="text-2xl font-black text-blue-600">₱0</p>
                </div>
                <div class="text-center border-l border-slate-100">
                    <p class="text-xs text-slate-400 uppercase tracking-widest font-bold mb-1">Assigned Target</p>
                    <p id="targetText" class="text-2xl font-black text-slate-700">₱0</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Supabase Setup
        const SUPABASE_URL = 'https://jhldmarwkulkcjnrjvfk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpobGRtYXJ3a3Vsa2NqbnJqdmZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAzMjQsImV4cCI6MjA5MTg1NjMyNH0.AhjpHXlZSgWNlEshgc0giSSUvHV249f34424i-5g8do';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let gaugeChart;

        // 2. Fetch Unique Departments for Dropdown
        async function loadDepartments() {
            const { data, error } = await supabaseClient
                .from('revenue_targets')
                .select('department');
            
            if (error) return console.error(error);

            // Get unique names and sort them
            const uniqueDepts = [...new Set(data.map(item => item.department))].sort();
            const select = document.getElementById('deptSelect');
            
            uniqueDepts.forEach(dept => {
                const opt = document.createElement('option');
                opt.value = dept;
                opt.innerHTML = dept;
                select.appendChild(opt);
            });
        }

        // 3. Initialize Gauge with Achievement Label
        function initChart() {
            gaugeChart = Highcharts.chart('container', {
                chart: { type: 'gauge', height: '100%' },
                title: { text: 'Monthly Achievement Status', style: { fontWeight: '800', color: '#1e293b' } },
                pane: { startAngle: -90, endAngle: 89.9, background: null, center: ['50%', '75%'], size: '110%' },
                yAxis: {
                    min: 0, max: 150,
                    tickPosition: 'inside',
                    tickColor: '#ffffff',
                    tickLength: 20,
                    tickWidth: 2,
                    minorTickInterval: null,
                    labels: { distance: 25, style: { fontSize: '12px', color: '#64748b' } },
                    lineWidth: 0,
                    plotBands: [
                        { from: 0, to: 80, color: '#ef4444', thickness: 35 },   // Red
                        { from: 80, to: 100, color: '#f59e0b', thickness: 35 },  // Yellow
                        { from: 100, to: 150, color: '#22c55e', thickness: 35 }  // Green
                    ]
                },
                series: [{
                    name: 'Achievement',
                    data: [0],
                    dataLabels: {
                        useHTML: true,
                        format: '<div style="text-align:center"><span style="font-size:32px; color:#0f172a; font-weight:bold">{y}%</span><br/>' +
                                '<span style="font-size:14px; color:#64748b; font-weight:600">Achieved</span></div>',
                        borderWidth: 0,
                        y: 40
                    },
                    dial: { radius: '80%', backgroundColor: '#475569', baseWidth: 12, baseLength: '0%', rearLength: '0%' },
                    pivot: { backgroundColor: '#475569', radius: 8 }
                }],
                credits: { enabled: false }
            });
        }

        // 4. Fetch and Update Data
        async function refreshData() {
            const month = document.getElementById('monthSelect').value;
            const dept = document.getElementById('deptSelect').value;
            const loading = document.getElementById('loading');
            
            loading.classList.remove('hidden');

            let query = supabaseClient.from('revenue_targets').select('revenue, target').eq('month', month);
            if (dept !== 'ALL') query = query.eq('department', dept);

            const { data, error } = await query;
            if (error) return console.error(error);

            const totalRevenue = data.reduce((sum, row) => sum + (row.revenue || 0), 0);
            const totalTarget = data.reduce((sum, row) => sum + (row.target || 0), 0);
            
            let percentage = 0;
            if (totalTarget > 0) {
                percentage = parseFloat(((totalRevenue / totalTarget) * 100).toFixed(1));
            }

            // Update Statistics
            document.getElementById('revText').innerText = '₱' + totalRevenue.toLocaleString();
            document.getElementById('targetText').innerText = '₱' + totalTarget.toLocaleString();
            
            // Update Chart
            gaugeChart.series[0].points[0].update(percentage);
            loading.classList.add('hidden');
        }

        // 5. Setup Listeners
        document.getElementById('monthSelect').addEventListener('change', refreshData);
        document.getElementById('deptSelect').addEventListener('change', refreshData);

        window.onload = async () => {
            initChart();
            await loadDepartments(); // Dynamic department load
            refreshData();
        };
    </script>
</body>
</html>
