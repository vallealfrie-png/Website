<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/highcharts-more.js"></script>

    <style>
        /* Making the gauge container smaller as requested */
        .chart-wrapper {
            max-width: 400px; 
            margin: 0 auto;
        }
        #container {
            height: 300px;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <nav class="bg-white border-b border-slate-200 px-6 py-3 shadow-sm mb-6">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-7 h-7 bg-indigo-600 rounded flex items-center justify-center">
                    <span class="text-white font-bold text-sm">R</span>
                </div>
                <span class="text-lg font-bold text-slate-800">RevenueTracker</span>
            </div>
            <div class="flex space-x-6 text-sm font-semibold text-slate-500">
                <a href="index.html" class="hover:text-indigo-600 transition-colors">Home</a>
                <a href="revenuevstarget.html" class="text-indigo-600">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto px-4">
        <div class="bg-white rounded-xl shadow-sm p-5 mb-6 border border-slate-200 grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Month</label>
                <select id="monthSelect" class="w-full bg-slate-50 border border-slate-200 text-sm rounded-lg p-2 outline-none focus:border-indigo-500">
                    <option value="Jan">January</option>
                    <option value="Feb">February</option>
                    <option value="Mar">March</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Department</label>
                <select id="deptSelect" class="w-full bg-slate-50 border border-slate-200 text-sm rounded-lg p-2 outline-none focus:border-indigo-500">
                    <option value="ALL">All Departments</option>
                </select>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 p-6 overflow-hidden relative">
            <div id="loading" class="absolute inset-0 bg-white/80 z-10 flex items-center justify-center hidden">
                <span class="text-sm font-medium text-slate-500 animate-pulse">Updating...</span>
            </div>

            <div class="chart-wrapper">
                <div id="container"></div>
            </div>
            
            <div class="flex justify-between items-center mt-2 px-4 py-4 bg-slate-50 rounded-xl">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Actual Revenue</p>
                    <p id="revText" class="text-lg font-bold text-slate-800">₱0</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Goal</p>
                    <p id="targetText" class="text-lg font-bold text-slate-600">₱0</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jhldmarwkulkcjnrjvfk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpobGRtYXJ3a3Vsa2NqbnJqdmZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAzMjQsImV4cCI6MjA5MTg1NjMyNH0.AhjpHXlZSgWNlEshgc0giSSUvHV249f34424i-5g8do';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let gaugeChart;

        async function loadDepartments() {
            const { data } = await supabaseClient.from('revenue_targets').select('department');
            const uniqueDepts = [...new Set(data.map(item => item.department))].sort();
            const select = document.getElementById('deptSelect');
            uniqueDepts.forEach(dept => {
                const opt = document.createElement('option');
                opt.value = dept; opt.innerHTML = dept;
                select.appendChild(opt);
            });
        }

        function initChart() {
            gaugeChart = Highcharts.chart('container', {
                chart: { type: 'gauge', backgroundColor: 'transparent', height: '100%' },
                title: null,
                pane: {
                    startAngle: -100, endAngle: 100,
                    background: null, center: ['50%', '70%'], size: '100%'
                },
                yAxis: {
                    min: 0, max: 100,
                    lineWidth: 0,
                    tickWidth: 0, // Remove markers
                    minorTickWidth: 0,
                    labels: { enabled: false }, // Remove numbers
                    plotBands: [
                        { from: 0, to: 25, color: '#ff4d4d', thickness: 45 },    // Red (25%)
                        { from: 25, to: 75, color: '#ffad33', thickness: 45 },  // Orange (50%)
                        { from: 75, to: 100, color: '#2eb82e', thickness: 45 }  // Green (25%)
                    ]
                },
                series: [{
                    name: 'Achievement',
                    data: [0],
                    dataLabels: {
                        useHTML: true,
                        // This is the percentage container inside the chart
                        format: '<div style="background:#1e293b; color:white; padding: 6px 16px; border-radius: 99px; text-align:center; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);">' +
                                '<span style="font-size:20px; font-weight:800">{y}%</span><br/>' +
                                '<span style="font-size:10px; opacity:0.8; text-transform:uppercase; font-weight:700">Achieved</span>' +
                                '</div>',
                        y: 50, borderWidth: 0
                    },
                    dial: {
                        radius: '90%', 
                        backgroundColor: '#1e293b', 
                        baseWidth: 8, 
                        topWidth: 1, 
                        baseLength: '0%', 
                        rearLength: '10%' 
                    },
                    pivot: { backgroundColor: '#1e293b', radius: 8 }
                }],
                credits: { enabled: false }
            });
        }

        async function refreshData() {
            document.getElementById('loading').classList.remove('hidden');
            const month = document.getElementById('monthSelect').value;
            const dept = document.getElementById('deptSelect').value;

            let query = supabaseClient.from('revenue_targets').select('revenue, target').eq('month', month);
            if (dept !== 'ALL') query = query.eq('department', dept);

            const { data } = await query;
            const totalRevenue = data.reduce((sum, row) => sum + (row.revenue || 0), 0);
            const totalTarget = data.reduce((sum, row) => sum + (row.target || 0), 0);
            
            let actualPercentage = 0;
            if (totalTarget > 0) {
                actualPercentage = parseFloat(((totalRevenue / totalTarget) * 100).toFixed(1));
            }

            document.getElementById('revText').innerText = '₱' + totalRevenue.toLocaleString();
            document.getElementById('targetText').innerText = '₱' + totalTarget.toLocaleString();
            
            // Pointer clamping: If > 100, point to 100, but the label shows actual percentage
            let needleValue = actualPercentage > 100 ? 100 : actualPercentage;
            
            gaugeChart.series[0].points[0].update({
                y: needleValue,
                dataLabels: {
                    format: '<div style="background:#1e293b; color:white; padding: 6px 16px; border-radius: 99px; text-align:center; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);">' +
                            '<span style="font-size:22px; font-weight:800">' + actualPercentage + '%</span><br/>' +
                            '<span style="font-size:10px; opacity:0.8; text-transform:uppercase; font-weight:700">Achieved</span>' +
                            '</div>'
                }
            });
            
            document.getElementById('loading').classList.add('hidden');
        }

        document.getElementById('monthSelect').addEventListener('change', refreshData);
        document.getElementById('deptSelect').addEventListener('change', refreshData);

        window.onload = async () => {
            initChart();
            await loadDepartments();
            refreshData();
        };
    </script>
</body>
</html>
