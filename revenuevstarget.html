<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Revenue Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/highcharts-more.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        
        /* THE GLOWING BORDER EFFECT */
        .glowing-border {
            position: relative;
            background: rgba(15, 23, 42, 0.8);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glowing-border::before {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: 28px;
            padding: 1.5px; 
            background: linear-gradient(135deg, #6366f1, transparent 40%, transparent 60%, #a855f7);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .highcharts-container { transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1); }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="border-b border-white/5 px-8 py-5 mb-10 bg-slate-900/40 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl shadow-[0_0_20px_rgba(99,102,241,0.4)] flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <h1 class="text-lg font-extrabold tracking-tight text-white leading-none uppercase">Revenue Intel</h1>
            </div>
            <div class="text-[11px] font-black uppercase tracking-widest text-indigo-400">Executive Dashboard v2.0</div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 space-y-8">
        
        <div class="glowing-border p-2 flex flex-wrap gap-2 items-center">
            <select id="monthSelect" class="flex-1 bg-transparent text-sm p-4 font-bold text-white outline-none cursor-pointer rounded-xl">
                <option class="bg-slate-900" value="ALL">Year-to-Date (All Months)</option>
                <option class="bg-slate-900" value="Jan">January</option>
                <option class="bg-slate-900" value="Feb">February</option>
                <option class="bg-slate-900" value="Mar">March</option>
            </select>
            <select id="deptSelect" class="flex-1 bg-transparent text-sm p-4 font-bold text-white outline-none cursor-pointer rounded-xl border-l border-white/10">
                <option class="bg-slate-900" value="ALL">Consolidated Hospital</option>
            </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glowing-border p-8">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">2026 Actual</p>
                <h3 id="score2026" class="text-4xl font-black text-white tracking-tighter">₱0</h3>
            </div>
            <div class="glowing-border p-8">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">2025 Benchmark</p>
                <h3 id="score2025" class="text-4xl font-black text-slate-400 tracking-tighter">₱0</h3>
            </div>
            <div class="glowing-border p-8">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Growth Rate</p>
                <h3 id="growthValue" class="text-4xl font-black tracking-tighter">0%</h3>
            </div>
        </div>

        <div class="glowing-border p-10 pt-6">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-sm font-black text-white uppercase tracking-widest">Live Target Achievement</h2>
                    <p class="text-[10px] text-slate-500 font-bold">Real-time performance vs quota</p>
                </div>
            </div>
            
            <div class="flex flex-col lg:flex-row items-center justify-between gap-8">
                <div class="flex-1 text-center lg:text-left">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Total Revenue</p>
                    <p id="revText" class="text-3xl font-black text-indigo-400 tracking-tighter">₱0</p>
                </div>

                <div class="flex-[3] w-full h-[380px] relative">
                    <div id="gaugeContainer" class="w-full h-full"></div>
                </div>

                <div class="flex-1 text-center lg:text-right">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Yearly Target</p>
                    <p id="targetText" class="text-3xl font-black text-white tracking-tighter">₱0</p>
                </div>
            </div>
        </div>

        <div class="glowing-border p-10">
            <h3 class="text-sm font-black text-white uppercase tracking-widest mb-6">Market Flow (2025 vs 2026)</h3>
            <div id="comparisonContainer" class="h-[350px]"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jhldmarwkulkcjnrjvfk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpobGRtYXJ3a3Vsa2NqbnJqdmZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAzMjQsImV4cCI6MjA5MTg1NjMyNH0.AhjpHXlZSgWNlEshgc0giSSUvHV249f34424i-5g8do';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let gaugeChart, comparisonChart;

        function animateValue(id, start, end, duration, isCurrency = true) {
            const obj = document.getElementById(id);
            if (!obj) return;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const value = Math.floor(progress * (end - start) + start);
                obj.innerHTML = isCurrency ? '₱' + value.toLocaleString() : (end >= 0 ? '+' : '') + value + '%';
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function initCharts() {
            gaugeChart = Highcharts.chart('gaugeContainer', {
                chart: { type: 'gauge', backgroundColor: 'transparent', margin: [0, 0, 0, 0] },
                title: null,
                pane: { 
                    startAngle: -120, endAngle: 120, background: null, 
                    center: ['50%', '70%'], size: '125%' 
                },
                yAxis: {
                    min: 0, max: 150, // Higher max to prevent pointer clipping
                    lineWidth: 0, tickWidth: 0, minorTickWidth: 0, labels: { enabled: false },
                    plotBands: [
                        { from: 0, to: 30, color: '#ff1e56', thickness: 50 },
                        { from: 30, to: 70, color: '#ffac41', thickness: 50 },
                        { from: 70, to: 100, color: '#32ff7e', thickness: 50 },
                        { from: 100, to: 150, color: '#05c46b', thickness: 50 } // Darker green for overachievers
                    ]
                },
                series: [{
                    name: 'Achievement', data: [50], 
                    dataLabels: {
                        enabled: true, useHTML: true, y: -40,
                        format: '<div id="gaugeLabel" style="background:#6366f1; color:white; padding: 10px 20px; border-radius: 14px; font-weight:900; font-size:28px; box-shadow: 0 15px 35px rgba(99,102,241,0.6); border: 2px solid #fff;">{y}%</div>'
                    },
                    dial: { radius: '100%', backgroundColor: '#fff', baseWidth: 8, topWidth: 1, rearLength: '12%' },
                    pivot: { backgroundColor: '#fff', radius: 8 }
                }],
                credits: { enabled: false }
            });

            comparisonChart = Highcharts.chart('comparisonContainer', {
                chart: { type: 'column', backgroundColor: 'transparent' },
                title: null,
                xAxis: { categories: ['Jan', 'Feb', 'Mar'], labels: { style: { color: '#94a3b8' } }, lineWidth: 0 },
                yAxis: { title: { text: null }, gridLineColor: 'rgba(255,255,255,0.05)', labels: { style: { color: '#475569' } } },
                series: [
                    { name: '2025 History', color: '#1e293b', data: [0, 0, 0] },
                    { name: '2026 Current', color: '#6366f1', data: [0, 0, 0] }
                ],
                credits: { enabled: false }
            });
        }

        async function refreshData() {
            const month = document.getElementById('monthSelect').value;
            const dept = document.getElementById('deptSelect').value;

            // START AT MIDDLE (50%)
            gaugeChart.series[0].points[0].update(50, true, { duration: 400 });

            let { data } = await supabaseClient.from('revenue_targets').select('*');
            if (month !== 'ALL') data = data.filter(d => d.month === month);
            if (dept !== 'ALL') data = data.filter(d => d.department === dept);

            const curRev = data.filter(d => d.year == 2026).reduce((s, r) => s + (r.revenue || 0), 0);
            const curTarget = data.filter(d => d.year == 2026).reduce((s, r) => s + (r.target || 0), 0);
            const oldRev = data.filter(d => d.year == 2025).reduce((s, r) => s + (r.revenue || 0), 0);
            
            const achieve = curTarget > 0 ? Math.round((curRev / curTarget) * 100) : 0;
            const growth = oldRev > 0 ? Math.round(((curRev - oldRev) / oldRev) * 100) : 0;

            // ANIMATE
            animateValue('score2026', 0, curRev, 1200);
            animateValue('score2025', 0, oldRev, 1200);
            animateValue('growthValue', 0, growth, 1200, false);
            animateValue('revText', 0, curRev, 1200);
            animateValue('targetText', 0, curTarget, 1200);

            document.getElementById('growthValue').className = `text-4xl font-black tracking-tighter ${growth >= 0 ? 'text-emerald-400' : 'text-rose-400'}`;

            // UPDATE GAUGE TO ACTUAL PERCENTAGE (UNCAPPED)
            setTimeout(() => {
                gaugeChart.series[0].points[0].update(achieve);
            }, 500);

            const months = ['Jan', 'Feb', 'Mar'];
            comparisonChart.series[0].setData(months.map(m => data.filter(d => d.year == 2025 && d.month == m).reduce((s, r) => s + (r.revenue || 0), 0)));
            comparisonChart.series[1].setData(months.map(m => data.filter(d => d.year == 2026 && d.month == m).reduce((s, r) => s + (r.revenue || 0), 0)));
        }

        window.onload = async () => {
            initCharts();
            const { data } = await supabaseClient.from('revenue_targets').select('department');
            const uniqueDepts = [...new Set(data.map(item => item.department))].sort();
            const select = document.getElementById('deptSelect');
            uniqueDepts.forEach(dept => {
                const opt = document.createElement('option');
                opt.value = dept; opt.innerHTML = dept;
                opt.className = "bg-slate-900";
                select.appendChild(opt);
            });
            document.getElementById('monthSelect').addEventListener('change', refreshData);
            document.getElementById('deptSelect').addEventListener('change', refreshData);
            refreshData();
        };
    </script>
</body>
</html>
