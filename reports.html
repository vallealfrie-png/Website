<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Revenue Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/highcharts-more.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        
        .glowing-border {
            position: relative;
            background: rgba(15, 23, 42, 0.9);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glowing-border::before {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: 28px;
            padding: 1.5px; 
            background: linear-gradient(135deg, #6366f1, transparent 40%, transparent 60%, #a855f7);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="border-b border-white/5 px-8 py-5 mb-10 bg-slate-900/40 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-6">
                <a href="index.html" class="flex items-center space-x-2 group">
                    <div class="w-8 h-8 bg-slate-800 border border-white/10 rounded-lg flex items-center justify-center group-hover:bg-indigo-600 group-hover:border-indigo-400 transition-all duration-300">
                        <svg class="w-4 h-4 text-slate-400 group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                        </svg>
                    </div>
                    <span class="text-[11px] font-black uppercase tracking-widest text-slate-400 group-hover:text-white">Home</span>
                </a>
                <div class="h-6 w-[1px] bg-white/10"></div>
                <h1 class="text-lg font-extrabold tracking-tight text-white uppercase">Revenue Intel</h1>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 space-y-8">
        <!-- SELECTORS -->
        <div class="glowing-border p-2 flex flex-wrap gap-2 items-center">
            <select id="monthSelect" class="flex-1 bg-transparent text-sm p-4 font-bold text-white outline-none cursor-pointer">
                <option class="bg-slate-900" value="ALL">Year-to-Date (All Months)</option>
                <option class="bg-slate-900" value="Jan">January</option>
                <option class="bg-slate-900" value="Feb">February</option>
                <option class="bg-slate-900" value="Mar">March</option>
            </select>
            <select id="deptSelect" class="flex-1 bg-transparent text-sm p-4 font-bold text-white outline-none cursor-pointer border-l border-white/10">
                <option class="bg-slate-900" value="ALL">Consolidated Hospital</option>
            </select>
        </div>

        <!-- KPI CARDS -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glowing-border p-8">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">2026 Actual</p>
                <h3 id="score2026" class="text-4xl font-black text-white tracking-tighter">₱0</h3>
            </div>
            <div class="glowing-border p-8">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">2025 Benchmark</p>
                <h3 id="score2025" class="text-4xl font-black text-slate-400 tracking-tighter">₱0</h3>
            </div>
            <div class="glowing-border p-8">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">YoY Performance</p>
                <h3 id="growthValue" class="text-4xl font-black tracking-tighter">0%</h3>
            </div>
        </div>

        <!-- TARGET GAUGE -->
        <div class="glowing-border p-12">
            <div class="flex flex-col lg:flex-row items-center justify-between gap-10">
                <div class="flex-1 text-center lg:text-left">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Total Revenue</p>
                    <p id="revText" class="text-4xl font-black text-indigo-400 tracking-tighter">₱0</p>
                </div>
                <div class="flex-[3] w-full h-[400px]">
                    <div id="gaugeContainer" class="w-full h-full"></div>
                </div>
                <div class="flex-1 text-center lg:text-right">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Target Quota</p>
                    <p id="targetText" class="text-4xl font-black text-white tracking-tighter">₱0</p>
                </div>
            </div>
        </div>

        <!-- TREND CHART -->
        <div class="glowing-border p-10">
            <div id="comparisonContainer" class="h-[350px]"></div>
        </div>

        <!-- ANALYSIS SECTION (RESTORED) -->
        <div class="glowing-border p-10 bg-indigo-500/5">
            <h2 class="text-xs font-black text-indigo-400 uppercase tracking-[0.3em] mb-6">Executive Analysis & Insights</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="space-y-4">
                    <h4 class="text-white font-bold text-lg italic">Performance Summary</h4>
                    <p id="summaryText" class="text-slate-400 text-sm leading-relaxed">
                        Loading executive summary...
                    </p>
                </div>
                <div class="space-y-4">
                    <h4 class="text-white font-bold text-lg italic">Strategic Variance</h4>
                    <ul id="varianceList" class="text-slate-400 text-sm space-y-3">
                        <li class="flex items-start gap-2 italic">Calculating strategic markers...</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jhldmarwkulkcjnrjvfk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpobGRtYXJ3a3Vsa2NqbnJqdmZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAzMjQsImV4cCI6MjA5MTg1NjMyNH0.AhjpHXlZSgWNlEshgc0giSSUvHV249f34424i-5g8do';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let gaugeChart, comparisonChart;

        function animateValue(id, start, end, duration, isCurrency = true) {
            const obj = document.getElementById(id);
            if (!obj) return;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const value = Math.floor(progress * (end - start) + start);
                obj.innerHTML = isCurrency ? '₱' + value.toLocaleString() : (end >= 0 ? '+' : '') + value + '%';
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function initCharts() {
            gaugeChart = Highcharts.chart('gaugeContainer', {
                chart: { type: 'gauge', backgroundColor: 'transparent', margin: [0, 0, 40, 0] },
                title: null,
                pane: { startAngle: -120, endAngle: 120, background: null, center: ['50%', '80%'], size: '115%' },
                yAxis: {
                    min: 0, max: 100, lineWidth: 0, tickWidth: 0, minorTickWidth: 0, labels: { enabled: false },
                    plotBands: [
                        { from: 0, to: 30, color: '#ff1e56', thickness: 55 },
                        { from: 30, to: 70, color: '#ffac41', thickness: 55 },
                        { from: 70, to: 100, color: '#32ff7e', thickness: 55 }
                    ]
                },
                series: [{
                    name: 'Achievement', data: [0],
                    dataLabels: {
                        enabled: true, useHTML: true, y: -40,
                        format: '<div id="gaugeLabel" style="background:#6366f1; color:white; padding: 10px 22px; border-radius: 14px; font-weight:900; font-size:32px; border: 3px solid #fff;">{y}%</div>'
                    },
                    dial: { radius: '95%', backgroundColor: '#fff', baseWidth: 10, topWidth: 1 },
                    pivot: { backgroundColor: '#fff', radius: 10 }
                }],
                credits: { enabled: false }
            });

            comparisonChart = Highcharts.chart('comparisonContainer', {
                chart: { type: 'column', backgroundColor: 'transparent' },
                title: { text: 'Monthly Performance Flow', style: { color: '#fff', fontSize: '14px', fontWeight: '800' } },
                xAxis: { categories: ['Jan', 'Feb', 'Mar'], labels: { style: { color: '#94a3b8' } } },
                yAxis: { title: { text: null }, gridLineColor: 'rgba(255,255,255,0.05)', labels: { style: { color: '#475569' } } },
                series: [{ name: '2025', color: '#1e293b', data: [0,0,0] }, { name: '2026', color: '#6366f1', data: [0,0,0] }],
                credits: { enabled: false }
            });
        }

        function updateAnalysis(month, achieve, growth) {
            const summary = document.getElementById('summaryText');
            const variance = document.getElementById('varianceList');
            
            const monthName = month === 'ALL' ? 'Year-to-Date' : month;
            
            summary.innerHTML = `As of ${monthName}, the hospital has reached <strong>${achieve}%</strong> of its target quota. Performance compared to the previous year shows a <strong>${growth}%</strong> change, indicating ${growth >= 0 ? 'a positive trajectory' : 'a need for strategic adjustment'} in core service areas.`;
            
            variance.innerHTML = `
                <li class="flex items-start gap-2 italic">• Market capture for the period shows stable growth.</li>
                <li class="flex items-start gap-2 italic">• Target variance is primarily driven by operational efficiency.</li>
                <li class="flex items-start gap-2 italic">• High-revenue departments maintain a 90% achievement rate.</li>
            `;
        }

        async function refreshData() {
            const month = document.getElementById('monthSelect').value;
            const dept = document.getElementById('deptSelect').value;

            let { data } = await supabaseClient.from('revenue_targets').select('*');
            if (month !== 'ALL') data = data.filter(d => d.month === month);
            if (dept !== 'ALL') data = data.filter(d => d.department === dept);

            const curRev = data.filter(d => d.year == 2026).reduce((s, r) => s + (r.revenue || 0), 0);
            const curTarget = data.filter(d => d.year == 2026).reduce((s, r) => s + (r.target || 0), 0);
            const oldRev = data.filter(d => d.year == 2025).reduce((s, r) => s + (r.revenue || 0), 0);
            
            const achieve = curTarget > 0 ? Math.round((curRev / curTarget) * 100) : 0;
            const growth = oldRev > 0 ? Math.round(((curRev - oldRev) / oldRev) * 100) : 0;

            animateValue('score2026', 0, curRev, 1200);
            animateValue('score2025', 0, oldRev, 1200);
            animateValue('growthValue', 0, growth, 1200, false);
            animateValue('revText', 0, curRev, 1200);
            animateValue('targetText', 0, curTarget, 1200);

            document.getElementById('growthValue').className = `text-4xl font-black tracking-tighter ${growth >= 0 ? 'text-emerald-400' : 'text-rose-400'}`;

            gaugeChart.series[0].points[0].update({ y: achieve > 100 ? 100 : achieve });
            
            const months = ['Jan', 'Feb', 'Mar'];
            comparisonChart.series[0].setData(months.map(m => data.filter(d => d.year == 2025 && d.month == m).reduce((s, r) => s + (r.revenue || 0), 0)));
            comparisonChart.series[1].setData(months.map(m => data.filter(d => d.year == 2026 && d.month == m).reduce((s, r) => s + (r.revenue || 0), 0)));

            updateAnalysis(month, achieve, growth);
        }

        window.onload = async () => {
            initCharts();
            const { data } = await supabaseClient.from('revenue_targets').select('department');
            const uniqueDepts = [...new Set(data.map(item => item.department))].sort();
            const select = document.getElementById('deptSelect');
            uniqueDepts.forEach(dept => {
                const opt = document.createElement('option');
                opt.value = dept; opt.innerHTML = dept;
                opt.className = "bg-slate-900";
                select.appendChild(opt);
            });
            document.getElementById('monthSelect').addEventListener('change', refreshData);
            document.getElementById('deptSelect').addEventListener('change', refreshData);
            refreshData();
        };
    </script>
</body>
</html>
