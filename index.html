<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Central Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #386641;
            --secondary: #6a994e;
            --light: #a7c957;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* Glassmorphism Header */
        header {
            height: 80px;
            background: rgba(56, 102, 65, 0.6); /* Semi-transparent primary */
            backdrop-filter: blur(12px); /* The glass effect */
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        /* Hover Navigation Pill */
        .nav-pill {
            width: 50px;
            height: 45px;
            transition: width 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 99px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: white;
            cursor: pointer;
        }
        .nav-pill:hover { width: 400px; background: rgba(255, 255, 255, 0.2); }
        .nav-items { margin-left: 20px; display: flex; gap: 20px; font-size: 0.8rem; font-weight: 700; letter-spacing: 1px; }

        /* Full Screen Video Section */
        .hero-section {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .video-background {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover; /* Stretches to fill everything */
            z-index: -1;
        }

        /* Darkening the video for text readability */
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(26, 51, 33, 0.7));
            z-index: 1;
        }

        .content-wrap {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-pill shadow-lg">
            <i class="fa-solid fa-bars-staggered"></i>
            <div class="nav-items">
                <a href="#" class="hover:text-[#a7c957] transition">INTELLIGENCE</a>
                <a href="#" class="hover:text-[#a7c957] transition">SERVICES</a>
                <a href="#" class="hover:text-[#a7c957] transition">ANALYTICS</a>
                <a href="#" class="hover:text-[#a7c957] transition">CONTACT</a>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <div class="hidden md:flex flex-col text-right">
                <span class="text-[10px] text-[#a7c957] font-bold uppercase tracking-widest">Inquiry Hotline</span>
                <span class="text-white font-medium">(02) 887-1776</span>
            </div>
            <img src="https://i.imgur.com/VWEvNnK.png" alt="Logo" class="h-12 bg-white/90 p-1.5 rounded-xl shadow-lg">
        </div>
    </header>

    <main class="hero-section">
        <video autoplay muted loop playsinline class="video-background">
            <source src="https://i.imgur.com/f0hf38l.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay"></div>

        <div class="content-wrap">
            <div class="mb-6 inline-flex items-center gap-2 px-4 py-1 rounded-full bg-white/10 backdrop-blur-md border border-white/20">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#a7c957] opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-[#a7c957]"></span>
                </span>
                <span class="text-[10px] font-bold tracking-[0.2em] uppercase">System Online</span>
            </div>
            
            <h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-4 drop-shadow-2xl">
                MARKETING CENTRAL
            </h1>
            <p class="text-xl md:text-2xl font-light tracking-[0.5em] text-[#a7c957] uppercase mb-12">
                Intelligence
            </p>
            
            <div class="flex flex-col sm:flex-row gap-4">
                <button class="bg-[#386641] hover:bg-[#6a994e] text-white px-12 py-4 rounded-full font-bold transition-all transform hover:scale-105 shadow-xl border border-white/10">
                    ENTER PORTAL
                </button>
                <button class="bg-white/10 hover:bg-white/20 backdrop-blur-md text-white px-12 py-4 rounded-full font-bold transition-all border border-white/30 shadow-xl">
                    LEARN MORE
                </button>
            </div>
        </div>
    </main>

</body>
</html>
