<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Central Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #386641;
            --secondary: #6a994e;
            --light: #a7c957;
        }

        /* Hover-to-Expand Navigation Logic */
        .nav-container {
            width: 60px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            white-space: nowrap;
            background-color: var(--primary);
        }
        .nav-container:hover {
            width: 450px; /* Expands to show links */
        }
        .nav-links {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .nav-container:hover .nav-links {
            opacity: 1;
        }

        /* Full Screen Video Styling */
        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        .hero-overlay {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(56, 102, 65, 0.6));
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <header class="fixed top-0 w-full z-50 p-4 flex justify-between items-center px-8">
        <div class="nav-container flex items-center h-12 rounded-full shadow-lg px-4 text-white">
            <i class="fa-solid fa-bars-staggered text-xl"></i>
            <div class="nav-links ml-6 flex gap-6 font-medium">
                <a href="#" class="hover:text-[#a7c957]">Dashboard</a>
                <a href="#" class="hover:text-[#a7c957]">Analytics</a>
                <a href="#" class="hover:text-[#a7c957]">Campaigns</a>
                <a href="#" class="hover:text-[#a7c957]">Support</a>
            </div>
        </div>

        <div class="bg-white/90 p-2 rounded-lg backdrop-blur-md">
            <img src="https://i.imgur.com/VWEvNnK.png" alt="Logo" class="h-10 w-auto">
        </div>
    </header>

    <section class="relative h-screen w-full flex items-center justify-center text-center text-white">
        <video autoplay muted loop playsinline class="video-background">
            <source src="https://i.imgur.com/kYiasmN.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        
        <div class="absolute inset-0 hero-overlay"></div>

        <div class="relative z-10 px-6">
            <h1 class="text-5xl md:text-7xl font-black mb-4 drop-shadow-2xl uppercase tracking-tighter">
                Marketing Central Intelligence
            </h1>
            <p class="text-xl md:text-2xl font-light mb-8 max-w-2xl mx-auto opacity-90">
                Strategic visualization for modern growth.
            </p>
            <div class="flex justify-center gap-4">
                <button class="bg-[#a7c957] hover:bg-[#6a994e] text-[#386641] hover:text-white font-bold py-3 px-8 rounded-full transition-all duration-300">
                    Enter Dashboard
                </button>
            </div>
        </div>
    </section>

</body>
</html>
