<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Central Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #386641;
            --secondary: #6a994e;
            --light: #a7c957;
        }

        /* Hover-to-Expand Navigation */
        .nav-trigger {
            width: 50px;
            height: 50px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: var(--primary);
            overflow: hidden;
            display: flex;
            align-items: center;
            border-radius: 99px;
            white-space: nowrap;
            color: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        .nav-trigger:hover {
            width: 380px; 
        }

        .nav-items {
            opacity: 0;
            transform: translateX(-15px);
            transition: opacity 0.3s ease 0.1s, transform 0.3s ease 0.1s;
            margin-left: 20px;
            display: flex;
            gap: 20px;
        }

        .nav-trigger:hover .nav-items {
            opacity: 1;
            transform: translateX(0);
        }

        /* Full Section Video Background */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
        }

        video {
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
        }

        /* Gradient Overlay for Text Contrast */
        .overlay {
            background: linear-gradient(135deg, rgba(56, 102, 65, 0.5) 0%, rgba(0, 0, 0, 0.7) 100%);
            position: absolute;
            inset: 0;
        }
    </style>
</head>
<body class="m-0 p-0 overflow-hidden font-sans">

    <header class="fixed top-0 w-full z-50 p-6 flex justify-between items-center">
        <div class="nav-trigger px-4 cursor-pointer">
            <i class="fa-solid fa-bars-staggered text-xl min-w-[20px]"></i>
            <div class="nav-items font-medium text-sm tracking-wide">
                <a href="#" class="hover:text-[#a7c957] transition">Intelligence Hub</a>
                <a href="#" class="hover:text-[#a7c957] transition">Market Data</a>
                <a href="#" class="hover:text-[#a7c957] transition">Team Access</a>
                <a href="#" class="hover:text-[#a7c957] transition">Settings</a>
            </div>
        </div>

        <div class="bg-white/10 backdrop-blur-lg p-2 rounded-xl border border-white/20 shadow-xl">
            <img src="https://i.imgur.com/VWEvNnK.png" alt="Logo" class="h-10 w-auto">
        </div>
    </header>

    <section class="relative h-screen w-full flex flex-col items-center justify-center text-white text-center">
        
        <div class="video-container">
            <video autoplay muted loop playsinline>
                <source src="https://i.imgur.com/f0hf38l.mp4" type="video/mp4">
            </video>
            <div class="overlay"></div>
        </div>

        <div class="relative z-10 px-6 max-w-4xl">
            <h1 class="text-6xl md:text-8xl font-black mb-4 tracking-tight drop-shadow-2xl">
                MARKETING CENTRAL
            </h1>
            <h2 class="text-2xl md:text-4xl font-light text-[#a7c957] tracking-[0.3em] uppercase mb-10">
                Intelligence
            </h2>
            
            <div class="flex flex-wrap justify-center gap-4">
                <button class="bg-[#386641] hover:bg-[#6a994e] text-white px-10 py-4 rounded-full font-bold transition-all shadow-lg border border-[#a7c957]/30">
                    ACCESS DASHBOARD
                </button>
                <button class="bg-white/10 backdrop-blur-md hover:bg-white/20 text-white px-10 py-4 rounded-full font-bold transition-all border border-white/30">
                    VIEW REPORTS
                </button>
            </div>
        </div>

    </section>

</body>
</html>
