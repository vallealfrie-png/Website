<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Intelligence - Cinematic Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @property --bg-angle { inherits: false; initial-value: 0deg; syntax: "<angle>"; }
        @keyframes spin { to { --bg-angle: 360deg; } }
        
        @keyframes neonPulse {
            0%, 100% { text-shadow: 0 0 10px rgba(99, 102, 241, 0.4); opacity: 0.8; }
            50% { text-shadow: 0 0 25px rgba(99, 102, 241, 1), 0 0 40px rgba(99, 102, 241, 0.6); opacity: 1; }
        }

        body { background-color: #010101; color: #e5e5e5; display: flex; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        #sidebar { width: 180px; border-right: 1px solid #1a1a1a; background: #050505; display: flex; flex-direction: column; flex-shrink: 0; z-index: 50;}
        #deptList { flex-grow: 1; overflow-y: auto; scrollbar-width: none; padding: 12px; }
        
        .dept-btn {
            width: 100%; padding: 10px; margin-bottom: 6px; background: #0a0a0a;
            border: 1px solid #1a1a1a; border-radius: 6px; color: #555;
            font-size: 9px; font-weight: 800; text-transform: uppercase;
            text-align: left; letter-spacing: 1px; transition: all 0.3s ease;
        }
        .dept-btn:hover { color: #888; border-color: #333; }
        .dept-btn.active { color: #fff; border-color: #6366f1; background: #0c0c1e; border-left: 3px solid #6366f1; }

        .home-btn {
            display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px;
            background: rgba(99, 102, 241, 0.1); border-bottom: 1px solid #1a1a1a;
            color: #6366f1; font-size: 9px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px; transition: all 0.3s;
        }
        .home-btn:hover { background: rgba(99, 102, 241, 0.2); color: #fff; }

        .neon-card { border: 2px solid transparent; border-radius: 12px; animation: spin 4s infinite linear; position: relative; }
        .card-indigo { background: linear-gradient(#080808, #080808) padding-box, conic-gradient(from var(--bg-angle), #6366f1, #1e1b4b, #6366f1) border-box; }
        .card-emerald { background: linear-gradient(#080808, #080808) padding-box, conic-gradient(from var(--bg-angle), #10b981, #064e3b, #10b981) border-box; }
        .card-rose { background: linear-gradient(#080808, #080808) padding-box, conic-gradient(from var(--bg-angle), #f43f5e, #4c0519, #f43f5e) border-box; }
        .card-amber { background: linear-gradient(#080808, #080808) padding-box, conic-gradient(from var(--bg-angle), #f59e0b, #451a03, #f59e0b) border-box; }

        .pulsing-label { animation: neonPulse 2s infinite ease-in-out; }

        main { flex: 1; overflow-y: auto; padding: 30px; }

        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .progress-bar-bg { width: 240px; height: 2px; background: #111; overflow: hidden; margin-top: 20px; }
        #progressBar { height: 100%; width: 0%; background: #6366f1; box-shadow: 0 0 15px #6366f1; }

        .highcharts-background { fill: transparent !important; }

        .neon-select {
            width: 100%; background: #0a0a0a; border: 1px solid #1a1a1a;
            border-radius: 6px; color: #6366f1; font-size: 10px; font-weight: 900;
            padding: 8px; text-transform: uppercase; outline: none; cursor: pointer;
            appearance: none; transition: border-color 0.3s;
        }
        .neon-select:focus { border-color: #6366f1; }
    </style>
</head>
<body>

    <div id="loader">
        <h1 class="text-[10px] font-black uppercase tracking-[0.5em] text-indigo-500 animate-pulse">Initializing Database</h1>
        <div class="progress-bar-bg"><div id="progressBar"></div></div>
    </div>

    <aside id="sidebar">
        <a href="index.html" class="home-btn">
            <i class="fa-solid fa-house text-xs"></i>
            <span>Return to Hub</span>
        </a>

        <div class="p-4 border-b border-neutral-900">
             <h2 class="text-[9px] font-black text-neutral-400 uppercase tracking-widest mb-1">Database:</h2>
             <p class="text-[10px] font-bold text-indigo-500 uppercase">Mar 30, 2026</p>
        </div>
        
        <div class="p-3 border-b border-neutral-900">
            <h2 class="text-[8px] font-black text-neutral-500 uppercase tracking-widest mb-2">Time Matrix:</h2>
            <select id="monthFilter" onchange="handleMonthChange()" class="neon-select">
                <option value="all">Full Year Cycle</option>
            </select>
        </div>

        <div id="deptList">
            <button onclick="handleFilterChange('all', this)" class="dept-btn active">Global Grid</button>
        </div>
    </aside>

    <main>
        <header class="flex justify-between items-start mb-10">
            <div>
                <h1 class="text-3xl font-black uppercase text-white tracking-tighter">
                    Marketing Central <span class="text-indigo-500">Intelligence</span>
                </h1>
                <p class="text-[10px] text-neutral-500 font-bold uppercase tracking-[0.4em] mt-1">System Status: Active / encrypted_link_stable</p>
            </div>
            <div class="text-right">
                <p id="activeDeptLabel" class="text-2xl font-black uppercase tracking-tighter text-indigo-500 pulsing-label">
                    GLOBAL OVERVIEW
                </p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="neon-card card-indigo p-8">
                <p class="text-[9px] font-black text-indigo-400 uppercase tracking-widest">Live Census</p>
                <h2 id="totalCensus" class="text-8xl font-black text-white tracking-tighter">0</h2>
            </div>
            <div class="neon-card card-emerald p-8">
                <p class="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-4">Classification Matrix</p>
                <div id="typeStats" class="flex flex-wrap gap-x-12 gap-y-6"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-12">
            <div class="neon-card card-rose p-4 h-[380px]"><canvas id="locChart"></canvas></div>
            <div class="neon-card card-amber p-4 h-[380px]"><canvas id="ageChart"></canvas></div>
            <div class="neon-card card-emerald p-2 h-[380px]" id="genderContainer"></div>
            <div class="neon-card card-indigo p-2 h-[380px]" id="civilContainer"></div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://onietgpyfgjahqjmjlud.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uaWV0Z3B5ZmdqYWhxam1qbHVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3ODc3MzgsImV4cCI6MjA4NjM2MzczOH0.QYdZZpGSTQd4yZPnpIf8ozxC9yWL3nbGMX3do-Hb0SM';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const neonPalette = ['#6366f1', '#10b981', '#f59e0b', '#f43f5e', '#8b5cf6', '#06b6d4'];

        let masterData = [], chartJS_Instances = {};
        let currentDept = 'all';

        const monthOrder = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        async function init() {
            let rows = [], page = 0;
            while (true) {
                const { data, error } = await sb.from('patients').select('*').range(page * 1000, (page + 1) * 1000 - 1);
                if (error || !data || data.length === 0) break;
                rows = [...rows, ...data]; page++;
                document.getElementById('progressBar').style.width = `${Math.min((rows.length / 18841) * 100, 100)}%`;
                if (data.length < 1000) break;
            }

            masterData = rows.filter(r => r.location !== '#NAME?' && r.department !== '#NAME?').map(r => {
                let monthName = "Unknown";
                if (r.date) {
                    const parts = r.date.split('-'); 
                    const monthIndex = parseInt(parts[1], 10) - 1;
                    if (monthIndex >= 0 && monthIndex < 12) {
                        monthName = monthOrder[monthIndex];
                    }
                }
                return { ...r, extractedMonth: monthName };
            });

            setupSidebar();
            setupMonthSelector();
            document.getElementById('loader').style.display = 'none';
            render('all');
        }

        function setupSidebar() {
            const list = document.getElementById('deptList');
            const depts = [...new Set(masterData.map(d => d.department))].filter(Boolean).sort();
            depts.forEach(d => {
                const btn = document.createElement('button');
                btn.className = 'dept-btn';
                btn.textContent = d;
                btn.onclick = () => handleFilterChange(d, btn);
                list.appendChild(btn);
            });
        }

        function setupMonthSelector() {
            const monthSelect = document.getElementById('monthFilter');
            const availableMonths = [...new Set(masterData.map(d => d.extractedMonth))].filter(m => m !== "Unknown");
            availableMonths.sort((a, b) => monthOrder.indexOf(a) - monthOrder.indexOf(b));

            availableMonths.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m;
                monthSelect.appendChild(opt);
            });
        }

        function handleMonthChange() {
            render(currentDept);
        }

        function handleFilterChange(dept, el) {
            currentDept = dept;
            document.querySelectorAll('.dept-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            render(dept);
        }

        function render(dept) {
            const selectedMonth = document.getElementById('monthFilter').value;
            let filtered = masterData;
            
            if (dept !== 'all') filtered = filtered.filter(d => d.department === dept);
            if (selectedMonth !== 'all') filtered = filtered.filter(d => d.extractedMonth === selectedMonth);

            document.getElementById('activeDeptLabel').textContent = dept.toUpperCase();
            document.getElementById('totalCensus').textContent = filtered.length.toLocaleString();
            
            const types = {};
            filtered.forEach(d => { types[d.patient_type || 'Other'] = (types[d.patient_type || 'Other'] || 0) + 1; });
            const statsContainer = document.getElementById('typeStats');
            statsContainer.innerHTML = '';
            
            Object.entries(types).forEach(([t, c]) => {
                const div = document.createElement('div');
                div.innerHTML = `<p class="text-[9px] font-black text-neutral-500 uppercase tracking-widest">${t}</p>
                                 <p class="text-4xl font-black text-white">${c.toLocaleString()}</p>`;
                statsContainer.appendChild(div);
            });
            updateCharts(filtered);
        }

        function updateCharts(data) {
            const getSet = (k) => {
                const o = {}; data.forEach(d => { const v = d[k] || 'N/A'; o[v] = (o[v] || 0) + 1; });
                return Object.entries(o).sort((a,b) => b[1]-a[1]).slice(0, 6).map(x => ({ name: x[0], y: x[1] }));
            };
            drawBar('locChart', getSet('location'), 'Hotspot Locations');
            drawBar('ageChart', getSet('age_bracket'), 'Age Ranges');
            drawHighRadial('genderContainer', getSet('gender'), 'Gender Split', '70%');
            drawHighRadial('civilContainer', getSet('civil_status'), 'Civil Status', '0%');
        }

        function drawBar(id, data, title) {
            if (chartJS_Instances[id]) chartJS_Instances[id].destroy();
            chartJS_Instances[id] = new Chart(document.getElementById(id), {
                type: 'bar',
                data: {
                    labels: data.map(d => d.name),
                    datasets: [{ data: data.map(d => d.y), backgroundColor: neonPalette, borderRadius: 4 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        title: { display: true, text: title.toUpperCase(), color: '#fff', font: { weight: '900', size: 11 } }
                    },
                    scales: {
                        y: { ticks: { color: '#444' }, grid: { color: '#111' } },
                        x: { ticks: { color: '#eee', font: { weight: 'bold', size: 9 } }, grid: { display: false } }
                    }
                }
            });
        }

        function drawHighRadial(container, data, title, innerSize) {
            Highcharts.chart(container, {
                chart: { type: 'pie', backgroundColor: 'transparent' },
                title: { text: title.toUpperCase(), style: { color: '#FFFFFF', fontSize: '11px', fontWeight: '900' } },
                credits: { enabled: false },
                plotOptions: {
                    pie: {
                        innerSize: innerSize,
                        borderRadius: 5,
                        dataLabels: { enabled: true, format: '{point.name}', style: { color: '#888', fontSize: '9px' } }
                    }
                },
                series: [{ name: 'Total', colorByPoint: true, data: data, colors: neonPalette }]
            });
        }
        init();
    </script>
</body>
</html>
